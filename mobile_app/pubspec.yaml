name: mobile_app
description: Healthcare mobile application connected to ASP.NET Core Web API.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  go_router: ^16.0.0
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/banner.png
    - assets/images/doctor_female.png
    - assets/images/doctor_male.png
